name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_ID=${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/vue-app:latest \
            ./mon-app

      - name: Push Docker image (SHA tag)
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}

      - name: Push Docker image (latest tag)
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Service1Linux
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}

      - name: Afficher l'URL publique de l'App Service
        run: |
          echo "https://service1linux.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
